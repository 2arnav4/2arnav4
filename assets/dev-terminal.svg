<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="900" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="105" y1="0" x2="795" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff4d4d"/>
      <stop offset="0.48" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.75 0 0 0 0 1 0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .mono { font: 600 18px "Fira Code", "SFMono-Regular", Consolas, monospace; }
      .small { font: 600 13px "Fira Code", "SFMono-Regular", Consolas, monospace; letter-spacing: .04em; }
      .muted { fill: #8b949e; }
      .green { fill: #3fb950; }
      .blue { fill: #58a6ff; }
      .red { fill: #ff7b72; }
      .yellow { fill: #f2cc60; }
      .white { fill: #e6edf3; }
      .cursor { animation: blink 1s steps(2, start) infinite; }
      .line1 { animation: show1 8s linear infinite; opacity: 0; }
      .line2 { animation: show2 8s linear infinite; opacity: 0; }
      .line3 { animation: show3 8s linear infinite; opacity: 0; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .bar { transform-origin: 105px 205px; animation: load 8s ease-in-out infinite; }
      .float { animation: float 5s ease-in-out infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes show1 { 0%, 9% { opacity: 0; } 12%, 100% { opacity: 1; } }
      @keyframes show2 { 0%, 27% { opacity: 0; } 30%, 100% { opacity: 1; } }
      @keyframes show3 { 0%, 48% { opacity: 0; } 51%, 100% { opacity: 1; } }
      @keyframes pulse { 0%, 100% { opacity: .5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.18); } }
      @keyframes load { 0% { transform: scaleX(.05); } 28% { transform: scaleX(.38); } 58% { transform: scaleX(.72); } 82%, 100% { transform: scaleX(1); } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
  </defs>

  <rect x="8" y="8" width="884" height="244" rx="18" fill="url(#panel)" stroke="#30363d" stroke-width="2"/>
  <rect x="28" y="28" width="844" height="204" rx="14" fill="#010409" stroke="#21262d"/>

  <circle cx="54" cy="52" r="7" fill="#ff5f56"/>
  <circle cx="78" cy="52" r="7" fill="#ffbd2e"/>
  <circle cx="102" cy="52" r="7" fill="#27c93f"/>
  <text x="130" y="58" class="small muted">arnav@github-profile ~/build</text>

  <g class="float" filter="url(#softGlow)">
    <circle cx="782" cy="77" r="30" fill="#0ea5e9" fill-opacity=".15"/>
    <path d="M768 82c11-18 25-24 42-19-10 5-16 14-19 27-8-8-16-10-23-8Z" fill="#58a6ff"/>
  </g>

  <text x="72" y="105" class="mono green">$</text>
  <text x="100" y="105" class="mono white line1">building scalable systems</text>
  <rect x="362" y="88" width="10" height="22" rx="2" fill="#ff4d4d" class="cursor"/>

  <text x="72" y="140" class="mono green">$</text>
  <text x="100" y="140" class="mono blue line2">stack:</text>
  <text x="170" y="140" class="mono white line2">React · Next.js · Node.js · Go · PostgreSQL</text>

  <text x="72" y="175" class="mono green">$</text>
  <text x="100" y="175" class="mono yellow line3">status:</text>
  <text x="190" y="175" class="mono white line3">learning, shipping, improving</text>

  <rect x="105" y="205" width="690" height="8" rx="4" fill="#161b22"/>
  <rect x="105" y="205" width="690" height="8" rx="4" fill="url(#accent)" class="bar"/>

  <circle cx="815" cy="208" r="5" fill="#ff4d4d" class="pulse"/>
  <circle cx="835" cy="208" r="5" fill="#38bdf8" class="pulse"/>
  <circle cx="855" cy="208" r="5" fill="#22c55e" class="pulse"/>
</svg>
